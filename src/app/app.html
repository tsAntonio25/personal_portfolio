<div [style.--bg-start]="currentBg().start"
     [style.--bg-end]="currentBg().end"
     class="main-container transition-all duration-1000 ease-in-out min-h-screen w-full font-sans">
  
  <nav class="fixed top-0 left-0 z-50 flex items-center justify-between w-full h-24 bg-transparent">
    <div class="z-50 flex items-center justify-center p-4 ml-4 md:ml-8 bg-black w-16 h-16 md:w-20 md:h-20 rounded-b-[30px] md:rounded-b-[40px] hover:w-30 hover:h-30 hover:mt:5 transition-all border-2 border-slate-200">
      <img src="/assets/images/logo-white.png" alt="Logo" class="w-full h-auto">
    </div>

    <input type="checkbox" id="menu-toggle" class="hidden peer">

    <label for="menu-toggle" class="md:hidden mr-6 text-white text-3xl cursor-pointer z-50 peer-checked:hidden">
      <i class="fa-solid fa-bars"></i>
    </label>
    
    <label for="menu-toggle" class="hidden peer-checked:block md:hidden mr-6 text-white text-3xl cursor-pointer z-50">
      <i class="fa-solid fa-xmark"></i>
    </label>

    <div class="fixed top-0 right-0 h-screen w-64 bg-black/95 border-l border-white/10 flex flex-col items-center justify-center space-y-8 
                translate-x-full transition-transform duration-300 ease-in-out peer-checked:translate-x-0
                md:static md:h-full md:w-auto md:bg-black md:flex-row md:space-y-0 md:space-x-10 md:translate-x-0 md:border-2 md:border-slate-200 md:rounded-bl-[40px] md:px-10">
      
      <a href="#intro" class="text-lg font-medium text-white hover:text-indigo-300 hover:px-3 transition-all">Home</a>
      <a href="#about" class="text-lg font-medium text-white hover:text-indigo-300 hover:px-3 transition-all">About</a>
      <a href="#projects" class="text-lg font-medium text-white hover:text-indigo-300 hover:px-3 transition-all">Projects</a>
      <a href="#contact" class="text-lg font-medium text-white hover:text-indigo-300 hover:px-3 transition-all">Contact</a>
    </div>
  </nav>

  <section id="intro">
    <app-intro></app-intro>
    <!--  key featured project here  -->
  </section>

  <section id="about">
    <app-about></app-about>
  </section>

  <section id="tech">
    <app-tech-skills></app-tech-skills>
  </section>

  <section id="soft">
    <app-soft-skills></app-soft-skills>
  </section>

  <section id="projects">
    <app-projects></app-projects>
  </section>

  <section id="contact">
    <app-contact></app-contact>
    <!--  resume here  -->
  </section>



</div>

<router-outlet />
