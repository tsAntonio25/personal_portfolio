<div class="min-h-[60vh] flex items-center justify-center py-12 px-6 scroll-reveal transition-colors duration-500">
  
  <div class="flex flex-col items-center w-full max-w-4xl">
    
    <h1 [ngClass]="isDarkMode ? 'text-white' : 'text-black'"
        class="text-3xl sm:text-4xl md:text-6xl font-bold text-center mb-8 md:mb-12 tracking-tight transition-colors">
      Download my resume here
    </h1>

    <div [ngClass]="isDarkMode ? 'border-[#6f44dc]' : 'border-[#b5a462]'" 
         class="w-full border-t-2 mb-10 md:mb-16 transition-colors"></div>

    <a href="/assets/file/Antonio_Resume.pdf" download="My_Resume.pdf" class="group">
      <button type="button" 
        [ngClass]="isDarkMode 
          ? 'bg-[#6f44dc] text-white border-transparent hover:bg-[#191423]' 
          : 'bg-[#b5a462] text-black border-transparent hover:bg-[#e1e1e1] shadow-xl'"
        class="resume-btn px-8 md:px-16 py-4 md:py-5 text-lg md:text-xl font-bold rounded-md 
               transition-all duration-300 border hover:scale-105 active:scale-95 flex items-center gap-3">
        
        <i class="fa-solid fa-file-arrow-down"></i>
        Download Resume
      </button>
    </a>

  </div>
</div>
