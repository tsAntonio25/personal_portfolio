<div class="flex flex-col items-center p-8 font-sans my-10 w-full scroll-reveal">
  <h1 class="text-3xl font-bold mb-10 text-white">Soft Skills</h1>

  <div class="flex flex-col gap-6 w-full max-w-4xl text-white">
    
    @for (skill of softskills; track $index) {
      <div class="flex flex-row items-start gap-6 p-6 border border-white rounded-2xl w-full bg-black scroll-reveal delay-800">
        
        <div class="shrink-0 pt-1 ">
          <i [class]="skill.icon" class="text-4xl text-white"></i>
        </div>

        <div class="flex flex-col gap-1">
          <h3 class="text-xl font-bold">{{ skill.title }}</h3>
          <p class="text-gray-300 leading-relaxed">
            {{ skill.desc }}
          </p>
        </div>

      </div>
    }

  </div>
</div>
