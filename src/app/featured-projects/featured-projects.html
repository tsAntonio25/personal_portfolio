<div class="py-12 md:py-16 px-4 flex flex-col items-center justify-center min-h-screen scroll-reveal">
  <h1 class="text-3xl md:text-4xl font-bold text-white mb-8 md:mb-12 text-center tracking-tight">
    Featured Projects
  </h1>

  <div class="relative w-full max-w-4xl">
    <div class="carousel-container bg-black/40 backdrop-blur-md border border-white/20 rounded-[32px] p-6 md:p-12 transition-all duration-700">
      
      @for(proj of projects; track $index) {
        @if(currentIndex === $index) {
          <div class="flex flex-col items-center animate-fade-in">
            
            <div class="w-full max-w-2xl aspect-[16/10] md:aspect-video bg-slate-900 rounded-2xl mb-6 md:mb-8 overflow-hidden border border-white/10 shadow-2xl">
              <img [src]="proj.img" [alt]="proj.title" class="w-full h-full object-cover">
            </div>

            <h3 class="text-2xl md:text-3xl font-bold text-white mb-3 text-center">{{proj.title}}</h3>
            
            <p class="text-sm md:text-base text-slate-400 text-center max-w-2xl mb-6 leading-relaxed px-2 md:px-0">
              {{proj.desc}}
            </p>
            
            <p class="text-indigo-400 font-mono text-[10px] md:text-xs mb-8 tracking-[0.2em] uppercase text-center font-bold">
              {{proj.techstack}}
            </p>

            <a [href]="proj.link" target="_blank" class="w-full sm:w-auto text-center px-10 py-3 border border-white/40 bg-black text-white rounded-full hover:bg-white hover:text-black transition-all font-semibold text-sm md:text-base shadow-lg active:scale-95 transition-all">
              View Project
            </a>
          </div>
        }
      }
    </div>

    <div class="flex justify-center gap-4 mt-8">
      @for(dot of [0, 1]; track $index) {
        <button 
          (click)="setSlide($index)"
          [class]="currentIndex === $index ? 'w-10 bg-white' : 'w-4 bg-white/20 hover:bg-white/40'"
          class="h-2 md:h-2.5 rounded-full transition-all duration-500 cursor-pointer">
        </button>
      }
    </div>
  </div>
</div>
