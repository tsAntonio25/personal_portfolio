<div class="min-h-screen py-16 px-6 md:px-12 flex flex-col items-center scroll-reveal transition-colors duration-500">
  
  <h1 [ngClass]="isDarkMode ? 'text-white' : 'text-black'"
      class="text-3xl md:text-5xl font-bold mb-16 md:mb-20 text-center transition-colors">
    Certificates
  </h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-7xl">
    
    @for(cert of certificates; track $index) {
      <div [ngClass]="isDarkMode 
            ? 'bg-[#191423] border-[#885ee2] border shadow-indigo-500/5' 
            : 'bg-[#f8f6ef] border-[#b5a462] shadow-lg'"
           class="group relative flex flex-col backdrop-blur-sm rounded-2xl overflow-hidden transition-all duration-300 hover:border-indigo-500/50 hover:-translate-y-2">
        
        <div [ngClass]="isDarkMode ? 'bg-[#191423] '  : 'bg-[#f8f6ef]'"
             class="w-full aspect-4/3 overflow-hidden transition-colors">
          <img [src]="cert.imgpic" [alt]="cert.title" 
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
        </div>

        <div class="p-6 flex flex-col grow items-center text-center">
          <h4 [ngClass]="isDarkMode ? 'text-white' : 'text-slate-900'"
              class="text-xl font-bold mb-2 leading-tight transition-colors">
            {{cert.title}}
          </h4>
          
          <p [ngClass]="isDarkMode ? 'text-[#92b2e5]' : 'text-[#1e56a3]'"
             class="font-mono text-sm mb-6 font-semibold tracking-wide">
            {{cert.date}}
          </p>

          <div class="mt-auto w-full">
            <a [href]="cert.link" target="_blank" rel="noopener noreferrer">
              <button type="button" 
                [ngClass]="isDarkMode 
                  ? 'bg-[#6f44dc] text-white border-transparent hover:bg-[#2e2938]'
                  : 'bg-[#b5a462] text-black border-transparent hover:bg-[#e1e1e1] shadow-md'"
                class="w-full py-3 border font-bold rounded-xl transition-all active:scale-95">
                View Certificate
              </button>
            </a>
          </div>
        </div>

      </div>
    }

  </div>
</div>
