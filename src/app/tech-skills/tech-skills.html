<div class="flex flex-col items-center p-6 md:p-10 font-sans scroll-reveal transition-colors duration-500">
  
  <h1 [ngClass]="isDarkMode ? 'text-white' : 'text-black'"
      class="text-3xl md:text-4xl font-bold mb-8 md:mb-12 transition-colors">
    Technical Skills
  </h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 w-full max-w-6xl justify-items-center scroll-reveal delay-600">
    
    @for (cat of skillCategories; track cat.title) {
      <div [ngClass]="[
             isDarkMode ? 'bg-[#191423] border-[#885ee2]' : 'bg-[#f8f6ef] border-[#b5a462] shadow-lg',
             cat.title === 'Tools' ? 'lg:col-start-2' : ''
           ]"
           class="tech-skills-card border rounded-2xl p-6 w-full h-full flex flex-col items-center backdrop-blur-sm transition-all duration-500 hover:scale-[1.02]">
        
        <h3 [ngClass]="isDarkMode ? 'text-white' : 'text-slate-800'"
            class="text-xl md:text-2xl font-semibold mb-2 transition-colors">
          {{ cat.title }}
        </h3>
        
        <div [ngClass]="isDarkMode ? 'border-[#885ee2]' : 'border-[#b5a462]'"
             class="w-full border-t mb-6 transition-colors"></div>

        <div class="w-full flex flex-col gap-4 px-2 md:px-4">
          @for (tech of cat.data; track tech.name) {
            <div [ngClass]="isDarkMode ? 'text-white' : 'text-slate-700'"
                 class="flex items-center gap-4 text-lg md:text-xl transition-colors">
              
              <i [class]="tech.icon" 
                 [ngClass]="isDarkMode ? 'text-[#92b2e5]' : 'text-[#1e56a3]'"
                 class="w-8 text-center text-2xl"></i>
              
              <p class="font-medium">{{ tech.name }}</p>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
