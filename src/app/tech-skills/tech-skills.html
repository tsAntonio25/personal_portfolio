<div class="flex flex-col items-center p-6 md:p-10 font-sans scroll-reveal">
  <h1 class="text-2xl md:text-4xl font-bold mb-8 md:mb-12 text-white">Technical Skills</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 w-full max-w-6xl justify-items-center scroll-reveal delay-600">
    
    <div class="tech-skills-card border border-white/20 rounded-2xl p-6 w-full h-full flex flex-col items-center bg-black/40 backdrop-blur-sm transition-transform hover:scale-[1.02]">
      <h3 class="text-xl md:text-2xl font-semibold mb-2 text-white">Frontend</h3>
      <div class="w-full border-t border-white/20 mb-6"></div>

      <div class="w-full flex flex-col gap-4 px-2 md:px-4">
        @for (tech of frontend; track $index) {
          <div class="flex items-center gap-4 text-lg md:text-xl text-white">
            <i [class]="tech.icon" class="w-8 text-center text-indigo-400"></i>
            <p class="font-medium">{{ tech.name }}</p>
          </div>
        }
      </div>
    </div>

    <div class="tech-skills-card border border-white/20 rounded-2xl p-6 w-full h-full flex flex-col items-center bg-black/40 backdrop-blur-sm transition-transform hover:scale-[1.02]">
      <h3 class="text-xl md:text-2xl font-semibold mb-2 text-white">Backend</h3>
      <div class="w-full border-t border-white/20 mb-6"></div>
      <div class="w-full flex flex-col gap-4 px-2 md:px-4">
        @for (tech of backend; track $index) {
          <div class="flex items-center gap-4 text-lg md:text-xl text-white">
            <i [class]="tech.icon" class="w-8 text-center text-indigo-400"></i>
            <p class="font-medium">{{ tech.name }}</p>
          </div>
        }
      </div>
    </div>

    <div class="tech-skills-card border border-white/20 rounded-2xl p-6 w-full h-full flex flex-col items-center bg-black/40 backdrop-blur-sm transition-transform hover:scale-[1.02]">
      <h3 class="text-xl md:text-2xl font-semibold mb-2 text-white">Database</h3>
      <div class="w-full border-t border-white/20 mb-6"></div>
      <div class="w-full flex flex-col gap-4 px-2 md:px-4">
        @for (tech of database; track $index) {
          <div class="flex items-center gap-4 text-lg md:text-xl text-white">
            <i [class]="tech.icon" class="w-8 text-center text-indigo-400"></i>
            <p class="font-medium">{{ tech.name }}</p>
          </div>
        }
      </div>
    </div>

    <div class="tech-skills-card lg:col-start-2 border border-white/20 rounded-2xl p-6 w-full h-full flex flex-col items-center bg-black/40 backdrop-blur-sm transition-transform hover:scale-[1.02]">
      <h3 class="text-xl md:text-2xl font-semibold mb-2 text-white">Tools</h3>
      <div class="w-full border-t border-white/20 mb-6"></div>
      <div class="w-full flex flex-col gap-4 px-2 md:px-4">
        @for (tech of tools; track $index) {
          <div class="flex items-center gap-4 text-lg md:text-xl text-white">
            <i [class]="tech.icon" class="w-8 text-center text-indigo-400"></i>
            <p class="font-medium">{{ tech.name }}</p>
          </div>
        }
      </div>
    </div>

  </div>
</div>
