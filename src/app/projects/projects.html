<div class="relative w-full py-12 md:py-24 scroll-reveal overflow-hidden transition-colors duration-500">
  
  <h1 [ngClass]="isDarkMode ? 'text-white' : 'text-black'"
      class="text-center text-3xl md:text-5xl font-bold mb-4 transition-colors">
    My Projects
  </h1>
  <div [ngClass]="isDarkMode ? 'border-[#885ee2] ' : 'border-[#b5a462]'" 
       class="w-32 md:w-64 border-t-2 mx-auto mb-10 md:mb-20 transition-colors"></div>

  <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-4 z-[110] md:static md:block">
    <button (click)="prev()" 
            [ngClass]="isDarkMode ? 'bg-[#191423] border-[#885ee2] text-white hover:bg-[#885ee2] hover:text-black' : 'bg-[#f8f6ef] border-[#b5a462] text-black shadow-md hover:bg-[#4D462D] hover:text-white'"
            class="md:absolute md:left-4 lg:left-10 md:top-1/2 md:-translate-y-1/2 p-3 md:p-4 border rounded-full  transition-all shadow-xl cursor-pointer relative z-[120]">
      <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button (click)="next()" 
            [ngClass]="isDarkMode ? 'bg-[#191423] border-[#885ee2] text-white hover:bg-[#885ee2] hover:text-black' : 'bg-[#f8f6ef] border-[#b5a462] text-black shadow-md hover:bg-[#4D462D] hover:text-white'"
            class="md:absolute md:right-4 lg:right-10 md:top-1/2 md:-translate-y-1/2 border p-3 md:p-4 rounded-full  transition-all shadow-xl cursor-pointer relative z-[120]">
      <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="relative mx-auto pt-3 overflow-visible md:overflow-hidden h-150 md:h-187.5 w-full max-w-350">
    
    <div class="flex items-center absolute left-1/2 transition-transform duration-500 ease-in-out py-12 pointer-events-none"
         [style.transform]="getTransform()"
         style="width: max-content;">
      
      @for(project of projects; track $index) {
        <div 
          class="shrink-0 w-70 sm:w-[320px] md:w-87.5 rounded-xl p-4 md:p-6 transition-all duration-500 mx-2 md:mx-4 border pointer-events-auto"
          [ngClass]="{
            'scale-105 md:scale-110 z-20 opacity-100 shadow-2xl': $index === activeIndex,
            'scale-90 opacity-40 grayscale blur-[1px] md:blur-[2px]': $index !== activeIndex,
            'bg-[#191423] border-[#885ee2]': isDarkMode,
            'bg-[#f8f6ef] border-[#b5a462]': !isDarkMode
          }"
        >
          <div [ngClass]="isDarkMode ? 'bg-[#121212]' : 'bg-slate-100'"
               class="w-full h-32 sm:h-40 md:h-48 rounded-lg mb-4 md:mb-6 overflow-hidden transition-colors">
            <img [src]="project.imagepic" class="object-cover w-full h-full hover:scale-110 transition-transform duration-500">
          </div>

          <div class="text-center">
            <h4 [ngClass]="isDarkMode ? 'text-white' : 'text-slate-900'" 
                class="text-lg md:text-xl font-bold mb-2 transition-colors">
              {{project.title}}
            </h4>
            <p [ngClass]="isDarkMode ? 'text-gray-400' : 'text-slate-600'"
               class="text-xs md:text-sm italic mb-4 h-16 md:h-20 overflow-hidden leading-relaxed">
              "{{project.desc}}"
            </p>
            <p [ngClass]="isDarkMode ? 'text-[#92b2e5]' : 'text-[#1e56a3]'"
               class="text-[10px] md:text-xs font-mono font-bold mb-4">
              {{project.techstack}}
            </p>
            
            <a [href]="project.repolink" target="_blank" class="inline-block">
              <button [ngClass]="isDarkMode 
                        ? 'bg-[#6f44dc] text-white border-transparent hover:bg-[#2e2938]' 
                        : 'bg-[#b5a462] text-black border-transparent hover:bg-[#e1e1e1] shadow-md'"
                      class="px-6 md:px-8 py-2 text-sm md:text-base rounded-md border transition-all active:scale-95">
                View Repository
              </button>
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
