<div class="relative w-full py-24 scroll-reveal">
  <h1 class="text-center text-5xl font-bold text-white mb-4">My Projects</h1>
  <div class="w-64 border-t-2 border-white mx-auto mb-20"></div>

  <button (click)="prev()" class="absolute left-4 lg:left-10 top-1/2 -translate-y-1/2 z-50 bg-black p-4 border border-white rounded-full text-white hover:bg-slate-800 transition-all shadow-xl">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <button (click)="next()" class="absolute right-4 lg:right-10 top-1/2 -translate-y-1/2 z-50 bg-black border border-white p-4 rounded-full text-white hover:bg-slate-800 transition-all shadow-xl">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="relative mx-auto pt-3 overflow-hidden scroll-reveal delay-600" style="max-width: 1200px; height: 750px;">
    
    <div class="flex items-center absolute left-1/2 transition-transform duration-500 ease-in-out py-12 scroll-reveal delay-600"
         [style.transform]="'translateX(calc(-50% - ' + (activeIndex * 382) + 'px + ' + ( (projects.length - 1) * 191 ) + 'px))'"
         style="width: max-content;">
      
      @for(project of projects; track $index) {
        <div 
          class="shrink-0 w-87.5 bg-black rounded-xl shadow-2xl p-6 transition-all duration-500 mx-4 border border-slate-600"
          [ngClass]="{
            'scale-110 z-20 opacity-100 shadow-black/20': $index === activeIndex,
            'scale-90 opacity-40 grayscale blur-[1px]': $index !== activeIndex
          }"
        >
          <div class="w-full h-48 bg-gray-200 rounded-lg mb-6 flex items-center justify-center">
            <img [src]="project.imagepic" class="object-cover w-full h-full rounded-lg">
          </div>

          <div class="text-center text-white">
            <h4 class="text-xl font-bold mb-2">{{project.title}}</h4>
            <p class="text-gray-300 text-sm italic mb-6 h-20 overflow-visible text-ellipsis">"{{project.desc}}"</p>
            <p class="text-xs font-mono font-bold text-slate-300 mb-6">{{project.techstack}}</p>
            
            <a [href]="project.repolink" target="_blank">
              <button class="bg-[#1F2937] text-white px-8 py-2 rounded-md hover:scale-105 transition">View Repository</button>
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
